<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Universe ❤️</title>
    <style>
        :root {
            --sun-color: #ffdd67;
            --earth-color: #4da6ff;
            --moon-color: #e6e6e6;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1a0b2e 0%, #05020a 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        /* Twinkling Stars Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Romantic Floating Message */
        .love-message {
            position: absolute;
            top: 5%;
            text-align: center;
            z-index: 10;
            font-size: 1.8rem;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8), 0 0 20px rgba(255, 105, 180, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        .love-message span {
            font-weight: bold;
            color: #ff69b4;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 5px;
            font-style: italic;
        }

        /* The Universe Container */
        .universe {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* The Golden Sun */
        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--sun-color);
            border-radius: 50%;
            box-shadow: 0 0 40px #ffaa00, 0 0 80px #ff5500;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }

        /* Earth (Sonali) Orbit Line */
        .earth-orbit {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 1px dashed rgba(255, 105, 180, 0.25);
            border-radius: 50%;
            animation: spin 25s linear infinite;
        }

        /* Earth (Sonali) Container */
        .earth-group {
            position: absolute;
            top: -25px; /* Centers the 50px earth on the orbit line */
            left: 175px;
            width: 50px;
            height: 50px;
        }

        /* Earth Core */
        .earth {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #187bcd, #4da6ff);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(77, 166, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            position: relative;
            z-index: 3;
        }

        /* Moon (Boyfriend) Orbit Line */
        .moon-orbit {
            position: absolute;
            top: -35px;
            left: -35px;
            width: 120px;
            height: 120px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: spin 6s linear infinite;
        }

        /* Moon (Boyfriend) */
        .moon {
            position: absolute;
            top: 0px;
            left: 48px;
            width: 24px;
            height: 24px;
            background: #f4f4f4;
            border-radius: 50%;
            box-shadow: 0 0 12px #fff, inset -3px -3px 5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
        }

        /* Interactive Floating Hearts */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s ease-in forwards;
            z-index: 5;
        }

        /* Animations */
        @keyframes spin {
            100% { transform: rotate(300deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; text-shadow: 0 0 25px rgba(255, 105, 180, 1); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) scale(0.5) rotate(45deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="stars" id="starfield"></div>

    <div class="love-message">
        Just like the Moon revolves around the Earth...<br>
        <span>I will always revolve around my Sonali ❤️</span>
        <div class="subtitle">Click anywhere to shower her with love</div>
    </div>

    <div class="universe">
        <div class="sun">☀️</div>

        <div class="earth-orbit">
            <div class="earth-group">
                <div class="earth">👑 Sonali</div>
                
                <div class="moon-orbit">
                    <div class="moon">👦💖</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Create random background stars
        const starfield = document.getElementById('starfield');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.backgroundColor = '#fff';
            star.style.borderRadius = '50%';
            star.style.opacity = Math.random();
            // Twinkle effect
            star.style.animation = `pulse ${2 + Math.random() * 4}s infinite ease-in-out`;
            starfield.appendChild(star);
        }

        // Romantic click feature: Spawns hearts wherever you click
        document.addEventListener('click', (e) => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = (e.clientX - 10) + 'px';
            heart.style.top = (e.clientY - 10) + 'px';
            
            // Randomize slight size variants
            const size = 15 + Math.random() * 20;
            heart.style.fontSize = size + 'px';

            document.body.appendChild(heart);

            // Clean up heart element after animation finishes
            setTimeout(() => {
                heart.remove();
            }, 4000);
        });
    </script>
</body>
</html>
